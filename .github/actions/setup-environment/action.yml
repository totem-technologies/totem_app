name: "Setup Environment & Secrets"
description: "Creates .env and decodes Firebase/Google secrets"

inputs:
  firebase_options:
    description: "Base64 encoded firebase_options.dart"
    required: true
  google_services_json:
    description: "Base64 encoded google-services.json (Android)"
    required: false
  google_service_plist:
    description: "Base64 encoded GoogleService-Info.plist (iOS)"
    required: false
  flavor:
    required: true
    description: "The flavor. Options: staging, production"
    default: "production"

runs:
  using: "composite"
  steps:
    - name: Resolve API URL
      id: api_url
      shell: bash
      env:
        FLAVOR: ${{ inputs.flavor }}
      run: |
        if [ "$FLAVOR" = "staging" ]; then
          echo 'url=https://totem.kbl.io' >> "$GITHUB_OUTPUT"
        else
          echo 'url=https://www.totem.org' >> "$GITHUB_OUTPUT"
        fi

    - name: Create .env in totem_app
      shell: bash
      working-directory: ./packages/totem_app
      run: |
        {
          echo "ENVIRONMENT=\"${{ inputs.flavor }}\""
          echo 'MOBILE_API_URL="${{ steps.api_url.outputs.url }}"'
        } > .env

    - name: Create .env in totem_web
      shell: bash
      working-directory: ./packages/totem_web
      run: |
        echo 'MOBILE_API_URL="${{ steps.api_url.outputs.url }}"' > .env

    - name: Create Firebase options in totem_app
      shell: bash
      working-directory: ./packages/totem_app
      run: |
        mkdir -p lib
        echo "${{ inputs.firebase_options }}" | base64 -d > lib/firebase_options.dart

    - name: Decode Android Config
      if: ${{ inputs.google_services_json != '' }}
      shell: bash
      working-directory: ./packages/totem_app
      run: |
        echo "${{ inputs.google_services_json }}" | base64 -d > android/app/google-services.json

    - name: Decode iOS Config
      if: ${{ inputs.google_service_plist != '' }}
      shell: bash
      working-directory: ./packages/totem_app
      run: |
        mkdir -p ios/Runner
        echo "${{ inputs.google_service_plist }}" | base64 -d > ios/Runner/GoogleService-Info.plist

    - name: Create Firebase options in totem_web
      shell: bash
      working-directory: ./packages/totem_web
      run: |
        mkdir -p lib
        echo "${{ inputs.firebase_options }}" | base64 -d > lib/firebase_options.dart
