name: "Setup Environment & Secrets"
description: "Generates the .env file in totem_app and totem_web, and decodes Firebase/Google service credentials"

inputs:
  flavor:
    description: "Build flavor. Must be 'staging' or 'production'."
    required: true
  firebase_options:
    description: "Base64 encoded firebase_options.dart"
    required: true
  google_services_json:
    description: "Base64 encoded google-services.json (Android)"
    required: false
  google_service_plist:
    description: "Base64 encoded GoogleService-Info.plist (iOS)"
    required: false

runs:
  using: "composite"
  steps:
    - name: Validate flavor
      shell: bash
      env:
        FLAVOR: ${{ inputs.flavor }}
      run: |
        case "$FLAVOR" in
          staging|production) ;;
          *)
            echo "::error::Unknown flavor '$FLAVOR'. Must be one of: staging, production."
            exit 1
            ;;
        esac

    # totem_app and totem_web share the same runtime config, so each flavor
    # writes one .env body to both packages via tee.
    - name: Write .env (staging)
      if: ${{ inputs.flavor == 'staging' }}
      shell: bash
      run: |
        tee packages/totem_app/.env packages/totem_web/.env > /dev/null <<'EOF'
        ENVIRONMENT="staging"
        MOBILE_API_URL="https://totem.kbl.io"
        LIVEKIT_URL="wss://totem-d7esbgcp.livekit.cloud"
        EOF

    - name: Write .env (production)
      if: ${{ inputs.flavor == 'production' }}
      shell: bash
      run: |
        tee packages/totem_app/.env packages/totem_web/.env > /dev/null <<'EOF'
        ENVIRONMENT="production"
        MOBILE_API_URL="https://www.totem.org"
        LIVEKIT_URL="wss://totem-d7esbgcp.livekit.cloud"
        EOF

    - name: Decode firebase_options.dart (totem_app)
      shell: bash
      working-directory: ./packages/totem_app
      run: |
        mkdir -p lib
        echo "${{ inputs.firebase_options }}" | base64 -d > lib/firebase_options.dart

    - name: Decode firebase_options.dart (totem_web)
      shell: bash
      working-directory: ./packages/totem_web
      run: |
        mkdir -p lib
        echo "${{ inputs.firebase_options }}" | base64 -d > lib/firebase_options.dart

    - name: Decode google-services.json (Android)
      if: ${{ inputs.google_services_json != '' }}
      shell: bash
      working-directory: ./packages/totem_app
      run: |
        echo "${{ inputs.google_services_json }}" | base64 -d > android/app/google-services.json

    - name: Decode GoogleService-Info.plist (iOS)
      if: ${{ inputs.google_service_plist != '' }}
      shell: bash
      working-directory: ./packages/totem_app
      run: |
        mkdir -p ios/Runner
        echo "${{ inputs.google_service_plist }}" | base64 -d > ios/Runner/GoogleService-Info.plist
