name: "Setup build environment"
description: >-
  One-stop build environment setup, run right after checkout by every Flutter CI
  job: installs the Flutter toolchain (optionally Java 17 for Android), composes
  the flavor's .env from config/, and decodes the Firebase/Google service
  secrets. The Flutter/Java versions live here only — bump them in one place.

inputs:
  flavor:
    description: "Build flavor: 'development', 'staging' or 'production'."
    required: true
  java:
    description: "Also install Java 17 + Gradle cache (needed for Android builds)."
    default: "false"
  firebase_options:
    description: "Base64 encoded firebase_options.dart"
    required: true
  google_services_json:
    description: "Base64 encoded google-services.json (Android)"
    required: false
  google_service_plist:
    description: "Base64 encoded GoogleService-Info.plist (iOS)"
    required: false

runs:
  using: "composite"
  steps:
    - name: Setup Java
      if: ${{ inputs.java == 'true' }}
      uses: actions/setup-java@v5
      with:
        distribution: "zulu"
        java-version: "17.x"
        cache: "gradle"

    - name: Setup Flutter
      uses: subosito/flutter-action@v2.23.0
      with:
        channel: "stable"
        cache: true

    - name: Flutter version
      shell: bash
      run: flutter --version

    # Compose packages/*/.env from the layered sources in config/ (the single
    # source of truth, shared with the Makefile env-* targets). setup_env.dart
    # validates the flavor and writes both totem_app/.env and totem_web/.env.
    - name: Compose .env
      shell: bash
      env:
        FLAVOR: ${{ inputs.flavor }}
      run: dart scripts/setup_env.dart "$FLAVOR"

    - name: Decode firebase_options.dart (totem_app)
      shell: bash
      working-directory: ./packages/totem_app
      run: |
        mkdir -p lib
        echo "${{ inputs.firebase_options }}" | base64 -d > lib/firebase_options.dart

    - name: Decode firebase_options.dart (totem_web)
      shell: bash
      working-directory: ./packages/totem_web
      run: |
        mkdir -p lib
        echo "${{ inputs.firebase_options }}" | base64 -d > lib/firebase_options.dart

    - name: Decode google-services.json (Android)
      if: ${{ inputs.google_services_json != '' }}
      shell: bash
      working-directory: ./packages/totem_app
      run: |
        echo "${{ inputs.google_services_json }}" | base64 -d > android/app/google-services.json

    - name: Decode GoogleService-Info.plist (iOS)
      if: ${{ inputs.google_service_plist != '' }}
      shell: bash
      working-directory: ./packages/totem_app
      run: |
        mkdir -p ios/Runner
        echo "${{ inputs.google_service_plist }}" | base64 -d > ios/Runner/GoogleService-Info.plist
