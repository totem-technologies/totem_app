name: Flutter Analysis
on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:

jobs:
  package-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Flutter
        uses: subosito/flutter-action@main
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Create .env file
        run: |
          echo 'MOBILE_API_URL="https://totem.kbl.io"' > ./packages/totem_app/.env
          echo 'MOBILE_API_URL="https://totem.kbl.io"' > ./packages/totem_web/.env

      # - name: Install Firebase CLI
      #   run: |
      #     curl -sL https://firebase.tools | bash
      #     dart pub global activate flutterfire_cli

      - name: Decode firebase_options.dart
        working-directory: packages/totem_app
        run: |
          mkdir -p lib
          echo "${{ secrets.FIREBASE_OPTIONS_B64 }}" | base64 -d > lib/firebase_options.dart

      - name: Decode firebase_options.dart
        working-directory: packages/totem_web
        run: |
          mkdir -p lib
          echo "${{ secrets.FIREBASE_OPTIONS_B64 }}" | base64 -d > lib/firebase_options.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: |
          dart format --set-exit-if-changed .

      - name: Run analysis
        run: flutter analyze

      - name: Run core tests
        working-directory: packages/totem_core
        run: flutter test

      - name: Run app tests
        working-directory: packages/totem_app
        run: flutter test

      # - name: Run web tests
      #   working-directory: packages/totem_web
      #   run: flutter test
